<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Login - LOANZ 360</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #ff6600;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #ccc;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #ff6600;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #ff6600;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #ff8533;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #ef4444;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: #10b981;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 Super Admin Login</h1>
        <p class="subtitle">Static HTML - No Next.js bundling</p>

        <div id="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email:</label>
                <input
                    type="email"
                    id="email"
                    placeholder="sales.loanz360@gmail.com"
                    required
                />
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter secure password"
                    required
                />
            </div>

            <button type="submit" id="submitBtn">Access Super Admin Portal</button>
        </form>

        <p style="margin-top: 20px; text-align: center; font-size: 12px; color: #666;">
            This is a static HTML page to test if the error is in Next.js bundling
        </p>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value;
            const password = passwordInput.value;

            messageDiv.innerHTML = '';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Authenticating...';

            try {
                const response = await fetch('/api/superadmin/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    messageDiv.innerHTML = '<div class="success">✓ Login successful! Redirecting...</div>';
                    setTimeout(() => {
                        window.location.href = '/superadmin';
                    }, 1000);
                } else {
                    messageDiv.innerHTML = `<div class="error">✗ ${data.error || 'Authentication failed'}</div>`;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Access Super Admin Portal';
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="error">✗ Network error. Please try again.</div>';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Access Super Admin Portal';
            }
        });
    </script>
</body>
</html>
