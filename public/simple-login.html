<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Super Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        h1 {
            color: #ff6600;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #fff;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #ff6600;
            box-shadow: 0 0 0 3px rgba(255, 102, 0, 0.1);
        }
        input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6600 0%, #ff8833 100%);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 102, 0, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
        }
        .message.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            color: #86efac;
        }
        .message.info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid #3b82f6;
            color: #93c5fd;
        }
        .debug {
            margin-top: 20px;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #888;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .link {
            margin-top: 20px;
            text-align: center;
        }
        .link a {
            color: #ff6600;
            text-decoration: none;
            font-size: 14px;
        }
        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🔓</div>
            <h1>Simple Super Admin Login</h1>
            <p class="subtitle">Bypass mode for troubleshooting</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    value="sales.loanz360@gmail.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    autocomplete="current-password"
                    placeholder="Enter your password"
                >
            </div>

            <button type="submit" id="submitBtn">
                <span id="btnText">Sign In</span>
            </button>
        </form>

        <div id="message" class="message"></div>
        <div id="debug" class="debug"></div>

        <div class="link">
            <a href="/superadmin/auth/login">← Back to normal login</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const messageDiv = document.getElementById('message');
        const debugDiv = document.getElementById('debug');

        function showMessage(text, type = 'info') {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }

        function showDebug(data) {
            debugDiv.textContent = JSON.stringify(data, null, 2);
            debugDiv.style.display = 'block';
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            btnText.textContent = loading ? 'Signing in...' : 'Sign In';
            document.getElementById('email').disabled = loading;
            document.getElementById('password').disabled = loading;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showMessage('Please enter both email and password', 'error');
                return;
            }

            setLoading(true);
            messageDiv.style.display = 'none';
            debugDiv.style.display = 'none';

            try {
                showMessage('Sending request...', 'info');

                const response = await fetch('/api/superadmin/auth/simple-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                    credentials: 'include' // Include cookies
                });

                const data = await response.json();
                showDebug({ status: response.status, response: data });

                if (response.ok && data.success) {
                    showMessage('✅ Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/superadmin';
                    }, 1000);
                } else {
                    showMessage(
                        `❌ Login failed: ${data.error || data.details || 'Unknown error'}`,
                        'error'
                    );
                    setLoading(false);
                }
            } catch (error) {
                showMessage(`❌ Network error: ${error.message}`, 'error');
                showDebug({ error: error.message, stack: error.stack });
                setLoading(false);
            }
        });

        // Focus password field on load
        window.addEventListener('load', () => {
            document.getElementById('password').focus();
        });
    </script>
</body>
</html>
