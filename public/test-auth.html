<!DOCTYPE html>
<html>
<head>
    <title>Test Auth Function</title>
    <style>
        body {
            font-family: monospace;
            background: #0a0a0a;
            color: #00ff00;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #1a1a1a;
            border: 2px solid #00ff00;
            padding: 30px;
            border-radius: 8px;
        }
        h1 { text-align: center; color: #00ff00; }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            display: block;
            margin: 0 auto 20px;
        }
        pre {
            background: #000;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .status {
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }
        .success { background: rgba(0,255,0,0.1); border: 2px solid #00ff00; }
        .error { background: rgba(255,0,0,0.1); border: 2px solid #ff0000; color: #ff0000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 TEST authenticateRequest() FUNCTION</h1>
        <button onclick="testAuth()">TEST AUTH NOW</button>
        <div id="status"></div>
        <div id="result"></div>
    </div>

    <script>
        async function testAuth() {
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');

            statusDiv.innerHTML = '<div class="status">Testing...</div>';
            resultDiv.innerHTML = '';

            try {
                const response = await fetch('/api/debug/test-auth', {
                    credentials: 'include'
                });

                const data = await response.json();

                let statusHtml = '';
                if (data.authResult?.isAuthenticated && data.authResult?.hasUser) {
                    statusHtml = `<div class="status success">✅ AUTH SUCCESS - User: ${data.authResult.user.email}</div>`;
                } else {
                    statusHtml = `<div class="status error">❌ AUTH FAILED - Error: ${data.authResult?.error || 'Unknown'}</div>`;
                }

                statusDiv.innerHTML = statusHtml;
                resultDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;

            } catch (error) {
                statusDiv.innerHTML = '<div class="status error">❌ REQUEST FAILED</div>';
                resultDiv.innerHTML = `<pre>Error: ${error.message}</pre>`;
            }
        }

        window.addEventListener('load', testAuth);
    </script>
</body>
</html>
